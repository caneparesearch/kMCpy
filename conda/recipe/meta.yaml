{% set name = "kmcpy" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ../..

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  entry_points:
    - kmcpy = kmcpy.cli.main:main
    - run_kmc = kmcpy.cli.run_kmc:main
    - start_kmcpy_gui = kmcpy.cli.gui_wrapper:main

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools >=77.0.0
    - wheel
  run:
    - python >=3.11
    - glob2 >=0.7
    - joblib >=1.5.3
    - monty >=2025.3.3
    - numba >=0.62
    - numpy >=1.26
    - pandas >=2.2
    - pymatgen >=2025.10.7
    - pyyaml >=6.0.3
    - scipy >=1.13
    - scikit-learn >=1.8.0

test:
  imports:
    - kmcpy
    - kmcpy.event
    - kmcpy.models
    - kmcpy.simulator
    - kmcpy.structure
  commands:
    - kmcpy --help
    - run_kmc --help

about:
  home: https://github.com/caneparesearch/kmcpy
  license: MIT
  license_file: LICENSE
  summary: Kinetic Monte Carlo Simulation using Python.
  description: |
    kMCpy is a Python package for kinetic Monte Carlo simulations in materials
    science, with local cluster expansion model tools and transport property
    analysis utilities.
  doc_url: https://kmcpy.readthedocs.io/
  dev_url: https://github.com/caneparesearch/kmcpy

extra:
  recipe-maintainers:
    - caneparesearch
