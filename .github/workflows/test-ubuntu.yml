name: Test

on:
    push:
    workflow_dispatch:

jobs:
    test-dev:
        runs-on: ubuntu-latest
        strategy:
            max-parallel: 5
            matrix:
                python-version: [3.11, 3.12, 3.13]  # Specify the Python versions you want to test against

        steps:
            - uses: actions/checkout@v4
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install the project
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -e .[dev]
            
            - name: Run tests
              run: pytest

    test-pip:
        runs-on: ubuntu-latest
        strategy:
            max-parallel: 5
            matrix:
                python-version: [3.11, 3.12]

        steps:
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install from PyPI
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install kmcpy
            
            - name: Test import
              run: python -c "import kmcpy; print('kmcpy imported successfully')"

    test-wheel-pip:
        runs-on: ubuntu-latest
        strategy:
            max-parallel: 5
            matrix:
                python-version: [3.11, 3.12, 3.13]

        steps:
            - uses: actions/checkout@v4
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Build wheel
              run: |
                  python -m pip install --upgrade pip build
                  python -m build --wheel

            - name: Install wheel with pip
              run: |
                  python -m venv .venv-install
                  .venv-install/bin/python -m pip install --upgrade pip
                  .venv-install/bin/python -m pip install dist/kmcpy-*.whl
                  .venv-install/bin/python -c "import kmcpy; print(kmcpy.__version__)"

    test-wheel-uv-pip:
        runs-on: ubuntu-latest
        strategy:
            max-parallel: 5
            matrix:
                python-version: [3.11, 3.12, 3.13]

        steps:
            - uses: actions/checkout@v4
            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}
            - name: Set up uv
              uses: astral-sh/setup-uv@v5

            - name: Build wheel
              run: uv build --wheel

            - name: Install wheel with uv pip
              run: |
                  uv venv .venv-install --python ${{ matrix.python-version }}
                  uv pip install --python .venv-install/bin/python dist/kmcpy-*.whl
                  .venv-install/bin/python -c "import kmcpy; print(kmcpy.__version__)"

    test-conda:
        runs-on: ubuntu-latest
        strategy:
            max-parallel: 5
            matrix:
                python-version: [3.11, 3.12]

        steps:
            - uses: actions/checkout@v4
            - name: Set up Miniconda
              uses: conda-incubator/setup-miniconda@v3
              with:
                  auto-update-conda: true
                  python-version: ${{ matrix.python-version }}
                  channels: conda-forge,defaults

            - name: Build wheel
              run: |
                  conda install -y pip
                  python -m pip install --upgrade pip build
                  python -m build --wheel
              shell: bash -el {0}

            - name: Install wheel with pip inside Conda
              run: |
                  python -m pip install dist/kmcpy-*.whl
              shell: bash -el {0}
            
            - name: Test import and CLI
              run: |
                  python -c "import kmcpy; print(kmcpy.__version__)"
                  kmcpy --help
                  run_kmc --help
              shell: bash -el {0}
